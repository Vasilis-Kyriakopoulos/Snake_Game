<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Snake</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="backdrop"></div>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Arcade Mode</p>
      <h1>Neon Snake</h1>
      <p class="subtitle">Dash through a glowing grid, collect energy cores, and chase your best score.</p>
    </section>

    <section class="game-card">
      <div class="hud">
        <div class="stat">
          <span class="label">Score</span>
          <strong id="score">0</strong>
        </div>
        <div class="stat">
          <span class="label">Best</span>
          <strong id="best-score">0</strong>
        </div>
        <div class="stat status-pill" id="status">Ready</div>
      </div>

      <div class="board-wrap">
        <canvas id="game" width="600" height="600" aria-label="Snake game board"></canvas>
        <div class="overlay" id="overlay">
          <div class="overlay-panel">
            <p id="overlay-kicker">Press any arrow key</p>
            <h2 id="overlay-title">Start the Run</h2>
            <p id="overlay-text">Use the arrow keys or WASD to move. Press space to pause.</p>
            <button id="restart-button" type="button">Play</button>
          </div>
        </div>
      </div>

      <div class="controls">
        <button id="pause-button" type="button">Pause</button>
        <button id="new-game-button" type="button">New Game</button>
      </div>

      <div class="tips">
        <span>Move: Arrow Keys / WASD</span>
        <span>Pause: Space</span>
        <span>Restart: Enter</span>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
